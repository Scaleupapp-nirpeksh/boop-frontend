name: Boop
options:
  bundleIdPrefix: com.boop
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    SWIFT_VERSION: "5.9"
    INFOPLIST_KEY_CFBundleDisplayName: "Boop"

packages:
  Firebase:
    url: https://github.com/firebase/firebase-ios-sdk
    from: 12.7.0
  SocketIO:
    url: https://github.com/socketio/socket.io-client-swift
    from: 16.1.1

targets:
  Boop:
    type: application
    platform: iOS
    sources:
      - path: Boop
        excludes:
          - "Resources/Preview Content"
      - path: Boop/Resources/Preview Content
        buildPhase: none
    resources:
      - path: Boop/Resources/Assets.xcassets
      - path: Boop/Resources/Fonts/Nunito[wght].ttf
      - path: Boop/Resources/Fonts/Nunito-Italic[wght].ttf
      - path: Boop/Resources/GoogleService-Info.plist
    dependencies:
      - package: Firebase
        product: FirebaseCore
      - package: Firebase
        product: FirebaseMessaging
      - package: SocketIO
        product: SocketIO
    entitlements:
      path: Boop/Resources/Boop.entitlements
      properties:
        aps-environment: development
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.boop.app
        INFOPLIST_FILE: Boop/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: Boop/Resources/Boop.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_ASSET_PATHS: "\"Boop/Resources/Preview Content\""
    info:
      path: Boop/Resources/Info.plist
      properties:
        CFBundleDisplayName: Boop
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        UILaunchScreen:
          UIColorName: ""
          UIImageName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIAppFonts:
          - Nunito[wght].ttf
          - Nunito-Italic[wght].ttf
        NSMicrophoneUsageDescription: "Boop needs your microphone to record your voice intro"
        NSCameraUsageDescription: "Boop needs camera access to take profile photos"
        NSPhotoLibraryUsageDescription: "Boop needs photo access to add profile photos"
        NSLocationWhenInUseUsageDescription: "Boop uses your location to find people near you"
        UIBackgroundModes:
          - remote-notification
        NSAppTransportSecurity:
          NSAllowsLocalNetworking: true
          NSExceptionDomains:
            35.154.171.1:
              NSExceptionAllowsInsecureHTTPLoads: true
              NSIncludesSubdomains: true
